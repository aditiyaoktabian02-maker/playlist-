<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Music Player</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#141e30,#243b55);
    color:white;
}

.player{

    width:350px;
    padding:30px;

    background:rgba(255,255,255,.1);
    backdrop-filter:blur(15px);

    border-radius:25px;

    text-align:center;

    box-shadow:0 0 30px rgba(0,0,0,.5);

}


.cover{

    width:220px;
    height:220px;

    margin:auto;

    border-radius:50%;

    object-fit:cover;

    animation:rotate 8s linear infinite;

    animation-play-state:paused;

}


.playing{

animation-play-state:running;

}


@keyframes rotate{

from{
transform:rotate(0deg);
}

to{
transform:rotate(360deg);
}

}


h2{

margin-top:20px;

}


p{

opacity:.7;

margin:10px;

}


.progress{

width:100%;

cursor:pointer;

}


.buttons{

display:flex;

justify-content:center;

gap:20px;

margin-top:20px;

}


button{

width:50px;
height:50px;

border:none;

border-radius:50%;

font-size:20px;

cursor:pointer;

background:white;

color:black;

}


.volume{

margin-top:20px;

width:100%;

}

</style>

</head>


<body>


<div class="player">


<img id="cover"
class="cover"
src="cover.jpg">


<h2 id="title">
Judul Lagu
</h2>


<p id="artist">
Nama Penyanyi
</p>


<audio id="audio"></audio>


<input 
type="range"
id="progress"
class="progress"
value="0">


<div class="buttons">

<button onclick="prev()">⏮</button>

<button onclick="playPause()" id="play">
▶️
</button>

<button onclick="next()">⏭</button>

</div>


<input 
type="range"
id="volume"
class="volume"
min="0"
max="1"
step="0.01"
value="0.5">


</div>



<script>


const songs=[

{

title:"Self Aware",

artist:"Temper City",

src:"#fyp #music #foryou #song_lyrics #singalong mp3",

cover:"ad7c3af6fc58c2bed9b49bae8c2c7251.webp.jpg"

},


{

title:"Shape of my heart",

artist:"Backstreet",

src:"#spotify #lyrics #fyp mp3",

cover:"dc1a54afb4fccd84f735fc66c1220efd.webp.jpg"

}


];


let index=0;


const audio=document.getElementById("audio");

const title=document.getElementById("title");

const artist=document.getElementById("artist");

const cover=document.getElementById("cover");

const play=document.getElementById("play");

const progress=document.getElementById("progress");

const volume=document.getElementById("volume");



function loadSong(){

audio.src=songs[index].src;

title.innerHTML=songs[index].title;

artist.innerHTML=songs[index].artist;

cover.src=songs[index].cover;

}


function playPause(){

if(audio.paused){

audio.play();

play.innerHTML="⏸";

cover.classList.add("playing");

}

else{

audio.pause();

play.innerHTML="▶️";

cover.classList.remove("playing");

}

}



function next(){

index++;

if(index>=songs.length){

index=0;

}

loadSong();

audio.play();

}



function prev(){

index--;

if(index<0){

index=songs.length-1;

}

loadSong();

audio.play();

}



audio.addEventListener("timeupdate",()=>{

progress.value=
(audio.currentTime/audio.duration)*100 || 0;

});


progress.addEventListener("input",()=>{

audio.currentTime=
(progress.value/100)*audio.duration;

});


volume.addEventListener("input",()=>{

audio.volume=volume.value;

});


audio.addEventListener("ended",next);


loadSong();


</script>


</body>
  </html>
